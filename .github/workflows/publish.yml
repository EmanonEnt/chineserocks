name: Publish Approved News

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'  # 每30分鐘運行一次

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        # 只安裝 requests，不再使用 notion-client
        pip install requests

    - name: Publish approved articles
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NEWS_DB_ID: ${{ secrets.NEWS_DB_ID }}
      run: |
        python scripts/publish_news.py

    - name: Commit and push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/news.json
        git diff --staged --quiet || (git commit -m "Update news.json" && git push)
