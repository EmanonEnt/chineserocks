name: Fetch News to Notion

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install notion-client feedparser beautifulsoup4 python-dateutil requests cloudinary
      
      - name: Fetch news from RSS to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NEWS_DB_ID: ${{ secrets.NEWS_DB_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          python scripts/fetch_news.py --source china --limit 10
          python scripts/fetch_news.py --source taiwan --limit 5
          python scripts/fetch_news.py --source international --limit 5
