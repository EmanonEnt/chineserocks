name: Fetch News

on:
  # 中国新闻：周一到周四 21:00 (UTC 13:00)
  schedule:
    - cron: '0 13 * * 1,2,3,4'

  # 中国新闻：周五到周日 12:00、18:00、22:00 (UTC 4:00、10:00、14:00)
  schedule:
    - cron: '0 4,10,14 * * 5,6,0'

  # 国际新闻：每周三和周六 12:00 (UTC 4:00)
  schedule:
    - cron: '0 4 * * 3,6'

  workflow_dispatch:
    inputs:
      mode:
        description: '抓取模式'
        required: true
        default: 'china'
        type: choice
        options:
          - china
          - international
          - test

jobs:
  fetch-china-weekday:
    if: github.event.schedule == '0 13 * * 1,2,3,4' || github.event.inputs.mode == 'china'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install feedparser requests notion-client beautifulsoup4
      - name: Fetch China News
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NEWS_DB_ID: ${{ secrets.NEWS_DB_ID }}
        run: python scripts/fetch_news.py --source china --limit 15

  fetch-china-weekend:
    if: github.event.schedule == '0 4,10,14 * * 5,6,0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install feedparser requests notion-client beautifulsoup4
      - name: Fetch China News (Weekend)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NEWS_DB_ID: ${{ secrets.NEWS_DB_ID }}
        run: python scripts/fetch_news.py --source china --limit 20

  fetch-international:
    if: github.event.schedule == '0 4 * * 3,6' || github.event.inputs.mode == 'international'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install feedparser requests notion-client beautifulsoup4
      - name: Fetch International News
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NEWS_DB_ID: ${{ secrets.NEWS_DB_ID }}
        run: python scripts/fetch_news.py --source international --limit 8

  test-fetch:
    if: github.event.inputs.mode == 'test'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install feedparser requests notion-client beautifulsoup4
      - name: Test Fetch
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NEWS_DB_ID: ${{ secrets.NEWS_DB_ID }}
        run: python scripts/fetch_news.py --source china --limit 1
