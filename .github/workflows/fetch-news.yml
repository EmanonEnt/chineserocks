name: Fetch News v12 - 国内源修复+国际去重增强版

on:
  schedule:
    # v12: 国内新闻增加到每天 4 次（更频繁）
    # 北京时间 10:00, 14:00, 18:00, 22:00 (UTC 2:00, 6:00, 10:00, 14:00)
    - cron: '0 2,6,10,14 * * *'

    # v12: 国际新闻减少到每周 1 次（减少重复）
    # 每周六 12:00 (UTC 4:00) - 每源1条
    - cron: '0 4 * * 6'

    # v12: 港台新闻减少到每周 1 次（平衡内容量）
    # 每周三 12:00 (UTC 4:00) - 每源3条
    - cron: '0 4 * * 3'

  workflow_dispatch:
    inputs:
      mode:
        description: '抓取模式'
        required: true
        default: 'test'
        type: choice
        options:
          - china          # 中國搖滾新聞 (每源10条，v12增加)
          - taiwan         # 台灣獨立音樂 (每源5条)
          - hongkong       # 香港搖滾新聞 (每源3条)
          - international  # 國際搖滾新聞 (每源1条，v12减少)
          - test           # 測試模式 (3條)
      days_limit:
        description: '日期限制(天) - 只抓取近N天內的新聞'
        required: false
        default: '30'
        type: string

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install feedparser requests notion-client beautifulsoup4 python-dateutil cloudinary

    - name: Fetch Rock News v12
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NEWS_DB_ID: ${{ secrets.NEWS_DB_ID }}
        CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
        CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        DAYS_LIMIT: ${{ github.event.inputs.days_limit || '30' }}
      run: |
        MODE="${{ github.event.inputs.mode }}"

        # 定時任務自動判斷
        if [ -z "$MODE" ]; then
          echo "=========================================="
          echo "🎸 ChineseRocks 搖滾新聞抓取 v12.0"
          echo "修复：移除不可靠RSSHub源，增强国际源间去重"
          echo "日期限制: 近${DAYS_LIMIT}天內"
          echo "=========================================="

          HOUR=$(date -u +%H)
          DOW=$(date -u +%u)

          echo "當前 UTC 時間: $HOUR:00, 星期$DOW"

          # v12: 国际新闻减少到每周六 1次
          if [ "$HOUR" == "04" ] && [ "$DOW" == "6" ]; then
            echo "🌍 國際搖滾新聞 (每源1条，减少重复，近${DAYS_LIMIT}天內)"
            python scripts/fetch_news_v12.py --source international --limit 1

          # v12: 港台新闻减少到每周三 1次
          elif [ "$HOUR" == "04" ] && [ "$DOW" == "3" ]; then
            echo "🇭🇰 港台搖滾新聞 (每源5条，近${DAYS_LIMIT}天內)"
            python scripts/fetch_news_v12.py --source taiwan --limit 5
            python scripts/fetch_news_v12.py --source hongkong --limit 3

          # v12: 中國新聞增加到每天 4 次
          else
            echo "🇨🇳 中國搖滾新聞 (每源10条，v12增加，近${DAYS_LIMIT}天內)"
            python scripts/fetch_news_v12.py --source china --limit 10
          fi

        else
          # 手動觸發
          echo "=========================================="
          echo "🎸 ChineseRocks 搖滾新聞抓取 v12.0 (手動)"
          echo "模式: $MODE"
          echo "日期限制: 近${DAYS_LIMIT}天內"
          echo "=========================================="

          case "$MODE" in
            china)
              echo "🇨🇳 中國搖滾新聞 (每源10条，v12增加，近${DAYS_LIMIT}天內)"
              python scripts/fetch_news_v12.py --source china --limit 10
              ;;
            taiwan)
              echo "🇹🇼 台灣獨立音樂 (每源5条，近${DAYS_LIMIT}天內)"
              python scripts/fetch_news_v12.py --source taiwan --limit 5
              ;;
            hongkong)
              echo "🇭🇰 香港搖滾新聞 (每源3条，近${DAYS_LIMIT}天內)"
              python scripts/fetch_news_v12.py --source hongkong --limit 3
              ;;
            international)
              echo "🌍 國際搖滾新聞 (每源1条，v12减少重复，近${DAYS_LIMIT}天內)"
              python scripts/fetch_news_v12.py --source international --limit 1
              ;;
            test)
              echo "🧪 測試模式 (3條，近${DAYS_LIMIT}天內)"
              python scripts/fetch_news_v12.py --source test --limit 3
              ;;
          esac
        fi

        echo "=========================================="
        echo "🤘 搖滾新聞抓取完成 v12.0"
        echo "修复：国内源更稳定，国际源间去重增强"
        echo "=========================================="
