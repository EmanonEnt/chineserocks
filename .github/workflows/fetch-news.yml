name: Fetch News

on:
  schedule:
    # 中国新闻：周一到周四 21:00 (UTC 13:00)
    - cron: '0 13 * * 1,2,3,4'
    # 中国新闻：周五到周日 12:00、18:00、22:00 (UTC 4:00、10:00、14:00)
    - cron: '0 4,10,14 * * 5,6,0'
    # 国际新闻：每周三和周六 12:00 (UTC 4:00) - 每源1條
    - cron: '0 4 * * 3,6'
    # 港台新闻：每周二、五 12:00 (UTC 4:00) - 每源2條
    - cron: '0 4 * * 2,5'

  workflow_dispatch:
    inputs:
      mode:
        description: '抓取模式'
        required: true
        default: 'test'
        type: choice
        options:
          - china          # 中國搖滾新聞 (每源5條)
          - international  # 國際搖滾新聞 (每源1條)
          - hongkong_taiwan # 港台搖滾新聞 (每源2條)
          - test           # 測試模式 (3條)

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install feedparser requests notion-client beautifulsoup4 python-dateutil cloudinary

    - name: Fetch Rock News
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NEWS_DB_ID: ${{ secrets.NEWS_DB_ID }}
        CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
        CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      run: |
        MODE="${{ github.event.inputs.mode }}"

        # 如果沒有手動輸入，則為定時任務自動判斷
        if [ -z "$MODE" ]; then
          echo "=========================================="
          echo "🎸 ChineseRocks 搖滾新聞抓取 (定時任務)"
          echo "=========================================="

          HOUR=$(date -u +%H)
          DOW=$(date -u +%u)  # 1=周一, 2=周二, ..., 6=周六, 7=周日

          echo "當前 UTC 時間: $HOUR:00, 星期$DOW"

          # 國際新聞：每週三、六 12:00 (UTC 4:00) -> 每源1條
          if [ "$HOUR" == "04" ] && ([ "$DOW" == "3" ] || [ "$DOW" == "6" ]); then
            echo "🌍 國際搖滾新聞 (每源1條)"
            python scripts/fetch_news.py --source international --limit 1

          # 港台新聞：每週二、五 12:00 (UTC 4:00) -> 每源2條
          elif [ "$HOUR" == "04" ] && ([ "$DOW" == "2" ] || [ "$DOW" == "5" ]); then
            echo "🇭🇰 港台搖滾新聞 (每源2條)"
            python scripts/fetch_news.py --source hongkong_taiwan --limit 2

          # 中國新聞：其他時間 -> 每源5條
          else
            echo "🇨🇳 中國搖滾新聞 (每源5條)"
            python scripts/fetch_news.py --source china --limit 5
          fi

        else
          # 手動觸發
          echo "=========================================="
          echo "🎸 ChineseRocks 搖滾新聞抓取 (手動)"
          echo "模式: $MODE"
          echo "=========================================="

          if [ "$MODE" == "china" ]; then
            echo "🇨🇳 中國搖滾新聞 (每源5條)"
            python scripts/fetch_news.py --source china --limit 5
          elif [ "$MODE" == "international" ]; then
            echo "🌍 國際搖滾新聞 (每源1條)"
            python scripts/fetch_news.py --source international --limit 1
          elif [ "$MODE" == "hongkong_taiwan" ]; then
            echo "🇭🇰 港台搖滾新聞 (每源2條)"
            python scripts/fetch_news.py --source hongkong_taiwan --limit 2
          elif [ "$MODE" == "test" ]; then
            echo "🧪 測試模式 (3條)"
            python scripts/fetch_news.py --source test --limit 3
          fi
        fi

        echo "=========================================="
        echo "🤘 搖滾新聞抓取完成"
        echo "=========================================="
