name: Fetch News

on:
  schedule:
    # 中國新聞：週一到週四 21:00 (UTC 13:00) - 每源5條
    - cron: '0 13 * * 1,2,3,4'
    # 中國新聞：週五到週日 12:00、18:00、22:00 (UTC 4:00、10:00、14:00) - 每源5條
    # 注意：週五 04:00 被移除，避免與港台新聞衝突
    - cron: '0 10,14 * * 5,6,0'
    # 國際新聞：每週三、六 12:00 (UTC 4:00) - 每源1條
    - cron: '0 4 * * 3,6'
    # 港台新聞：每週二、五 12:00 (UTC 4:00) - 每源2條
    - cron: '0 4 * * 2,5'

  workflow_dispatch:
    inputs:
      mode:
        description: '抓取模式'
        required: true
        default: 'test'
        type: choice
        options:
          - china          # 中國搖滾新聞 (每源5條)
          - taiwan         # 台灣獨立音樂 (每源2條)
          - hongkong       # 香港搖滾新聞 (每源2條)
          - international  # 國際搖滾新聞 (每源1條)
          - test           # 測試模式 (3條)
      days_limit:
        description: '日期限制(天) - 只抓取近N天內的新聞'
        required: false
        default: '15'
        type: string

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install feedparser requests notion-client beautifulsoup4 python-dateutil cloudinary

    - name: Fetch Rock News
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NEWS_DB_ID: ${{ secrets.NEWS_DB_ID }}
        CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
        CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        DAYS_LIMIT: ${{ github.event.inputs.days_limit || '15' }}
      run: |
        MODE="${{ github.event.inputs.mode }}"

        # 定時任務自動判斷
        if [ -z "$MODE" ]; then
          echo "=========================================="
          echo "🎸 ChineseRocks 搖滾新聞抓取 (定時任務)"
          echo "日期限制: 近${DAYS_LIMIT}天內"
          echo "=========================================="

          HOUR=$(date -u +%H)
          DOW=$(date -u +%u)

          echo "當前 UTC 時間: $HOUR:00, 星期$DOW"

          # 國際新聞：每週三、六 12:00 (UTC 4:00)
          if [ "$HOUR" == "04" ] && ([ "$DOW" == "3" ] || [ "$DOW" == "6" ]); then
            echo "🌍 國際搖滾新聞 (每源1條，近${DAYS_LIMIT}天內)"
            python scripts/fetch_news.py --source international --limit 1

          # 港台新聞：每週二、五 12:00 (UTC 4:00)
          elif [ "$HOUR" == "04" ] && ([ "$DOW" == "2" ] || [ "$DOW" == "5" ]); then
            echo "🇭🇰 港台搖滾新聞 (每源2條，近${DAYS_LIMIT}天內)"
            # 輪流抓取台灣和香港
            python scripts/fetch_news.py --source taiwan --limit 2
            python scripts/fetch_news.py --source hongkong --limit 2

          # 中國新聞：其他時間 (週五 04:00 已被移除)
          else
            echo "🇨🇳 中國搖滾新聞 (每源5條，近${DAYS_LIMIT}天內)"
            python scripts/fetch_news.py --source china --limit 5
          fi

        else
          # 手動觸發
          echo "=========================================="
          echo "🎸 ChineseRocks 搖滾新聞抓取 (手動)"
          echo "模式: $MODE"
          echo "日期限制: 近${DAYS_LIMIT}天內"
          echo "=========================================="

          case "$MODE" in
            china)
              echo "🇨🇳 中國搖滾新聞 (每源5條，近${DAYS_LIMIT}天內)"
              python scripts/fetch_news.py --source china --limit 5
              ;;
            taiwan)
              echo "🇹🇼 台灣獨立音樂 (每源2條，近${DAYS_LIMIT}天內)"
              python scripts/fetch_news.py --source taiwan --limit 2
              ;;
            hongkong)
              echo "🇭🇰 香港搖滾新聞 (每源2條，近${DAYS_LIMIT}天內)"
              python scripts/fetch_news.py --source hongkong --limit 2
              ;;
            international)
              echo "🌍 國際搖滾新聞 (每源1條，近${DAYS_LIMIT}天內)"
              python scripts/fetch_news.py --source international --limit 1
              ;;
            test)
              echo "🧪 測試模式 (3條，近${DAYS_LIMIT}天內)"
              python scripts/fetch_news.py --source test --limit 3
              ;;
          esac
        fi

        echo "=========================================="
        echo "🤘 搖滾新聞抓取完成"
        echo "=========================================="
