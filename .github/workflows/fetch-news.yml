name: Fetch News

on:
  schedule:
    # 中国新闻：周一到周四 21:00 (UTC 13:00)
    - cron: '0 13 * * 1,2,3,4'
    # 中国新闻：周五到周日 12:00、18:00、22:00 (UTC 4:00、10:00、14:00)
    - cron: '0 4,10,14 * * 5,6,0'
    # 国际新闻：每周三和周六 12:00 (UTC 4:00)
    - cron: '0 4 * * 3,6'
    # 港台新闻：每周二、五 12:00 (UTC 4:00)
    - cron: '0 4 * * 2,5'

  workflow_dispatch:
    inputs:
      mode:
        description: '抓取模式'
        required: true
        default: 'test'
        type: choice
        options:
          - china
          - international
          - hongkong_taiwan
          - test
      limit:
        description: '每源抓取數量'
        required: false
        default: '10'
        type: choice
        options:
          - '5'
          - '10'
          - '15'
          - '20'

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Fetch News
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NEWS_DB_ID: ${{ secrets.NEWS_DB_ID }}
      run: |
        MODE="${{ github.event.inputs.mode }}"
        LIMIT="${{ github.event.inputs.limit }}"

        if [ -z "$MODE" ]; then
          MODE="test"
        fi
        if [ -z "$LIMIT" ]; then
          LIMIT="10"
        fi

        echo "=========================================="
        echo "運行模式: $MODE"
        echo "抓取數量: $LIMIT"
        echo "=========================================="

        if [ "$MODE" == "china" ]; then
          echo "Running CHINA mode..."
          python scripts/fetch_news.py --source china --limit $LIMIT
        elif [ "$MODE" == "international" ]; then
          echo "Running INTERNATIONAL mode..."
          python scripts/fetch_news.py --source international --limit $LIMIT
        elif [ "$MODE" == "hongkong_taiwan" ]; then
          echo "Running HK/TW mode..."
          python scripts/fetch_news.py --source hongkong_taiwan --limit $LIMIT
        elif [ "$MODE" == "test" ]; then
          echo "Running TEST mode..."
          python scripts/fetch_news.py --source test --limit 3
        else
          HOUR=$(date -u +%H)
          DOW=$(date -u +%u)

          echo "Auto-detecting mode... Hour: $HOUR, Day: $DOW"

          if [ "$HOUR" == "04" ] && ([ "$DOW" == "3" ] || [ "$DOW" == "6" ]); then
            echo "Auto: INTERNATIONAL mode"
            python scripts/fetch_news.py --source international --limit 8
          elif [ "$HOUR" == "04" ] && ([ "$DOW" == "2" ] || [ "$DOW" == "5" ]); then
            echo "Auto: HK/TW mode"
            python scripts/fetch_news.py --source hongkong_taiwan --limit 8
          else
            echo "Auto: CHINA mode"
            python scripts/fetch_news.py --source china --limit 15
          fi
        fi

        echo "=========================================="
        echo "抓取完成"
        echo "=========================================="
