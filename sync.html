<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员同步 - ChineseRocks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #c0c0c0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .brand-header {
            margin-bottom: 25px;
        }

        .brand-title {
            font-size: 24px;
            font-weight: 900;
            color: #FF0066;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .brand-subtitle {
            font-size: 10px;
            color: #888;
            letter-spacing: 3px;
        }

        .star-decoration {
            font-size: 36px;
            color: #FF0066;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(255, 0, 102, 0.5);
            animation: starGlow 2s ease-in-out infinite alternate;
        }

        @keyframes starGlow {
            from { 
                text-shadow: 0 0 10px rgba(255, 0, 102, 0.5), 0 0 20px rgba(255, 0, 102, 0.3);
                transform: scale(1);
            }
            to { 
                text-shadow: 0 0 20px rgba(255, 0, 102, 0.8), 0 0 40px rgba(255, 0, 102, 0.5);
                transform: scale(1.1);
            }
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 0, 102, 0.2);
            border-top-color: #FF0066;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #fff;
            font-weight: 800;
            letter-spacing: 1px;
        }

        p {
            font-size: 14px;
            color: #888;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .phone-card {
            background: rgba(255, 0, 102, 0.1);
            border: 1px solid rgba(255, 0, 102, 0.3);
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .phone-label {
            font-size: 13px;
            color: #888;
        }

        .phone-number {
            font-size: 16px;
            color: #fff;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 6px;
            padding-left: 5px;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #FF0066;
            background: rgba(255, 255, 255, 0.08);
        }

        .form-input::placeholder {
            color: #555;
        }

        .user-info {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 0, 102, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
        }

        .user-info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .user-info-item:last-child {
            margin-bottom: 0;
        }

        .user-info-label {
            color: #666;
        }

        .user-info-value {
            color: #fff;
            font-weight: 600;
        }

        .points {
            color: #FF0066;
            font-size: 18px;
            font-weight: 900;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 14px 40px;
            background: #FF0066;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: #CC0052;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 0, 102, 0.3);
        }

        .btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: transparent;
            border: 1.5px solid #FF0066;
            color: #FF0066;
        }

        .btn-secondary:hover {
            background: rgba(255, 0, 102, 0.1);
            color: #FF0066;
        }

        .status-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .status-icon.success::after {
            content: '✅';
        }

        .status-icon.error::after {
            content: '❌';
        }

        .brand-footer {
            font-size: 11px;
            color: #444;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 30px;
        }

        .hidden {
            display: none;
        }

        .tips {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            line-height: 1.5;
        }

        .error-box {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
            font-size: 12px;
            color: #ff6666;
            word-break: break-all;
        }

        .debug-btn {
            background: transparent;
            border: 1px solid #333;
            color: #333;
            font-size: 11px;
            padding: 5px 10px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand-header">
            <div class="brand-title">CHINESE ROCKS</div>
            <div class="brand-subtitle">NEWS ★ CHARTS ★ MAGAZINE</div>
        </div>

        <!-- 错误状态：参数获取失败 -->
        <div id="error-state" class="hidden">
            <div class="star-decoration">★</div>
            <div class="status-icon error"></div>
            <h1>同步失败</h1>
            <p>无法获取您的手机号</p>

            <div class="error-box">
                <div>错误：手机号参数为空或格式错误</div>
                <div style="margin-top:8px; color:#888; font-size:11px;">请返回小程序重新进入</div>
            </div>

            <button class="btn" onclick="enterWebsite()">直接进入网站</button>
            <button class="btn btn-secondary" onclick="history.back()">返回小程序</button>

            <!-- 隐藏的调试按钮（长按5秒显示） -->
            <button class="debug-btn" id="debug-btn" style="display:none;" onclick="showDebug()">调试</button>
        </div>

        <!-- 第一步：欢迎+填写信息 -->
        <div id="welcome-state">
            <div class="star-decoration">★</div>
            <h1>欢迎加入 ChineseRocks！</h1>
            <p>完善您的摇滚身份</p>

            <div class="phone-card">
                <span class="phone-label">手机号</span>
                <span class="phone-number" id="display-phone">获取中...</span>
            </div>

            <div class="form-group">
                <label class="form-label">昵称 *</label>
                <input type="text" class="form-input" id="nickname-input" placeholder="请输入您的昵称" maxlength="20">
            </div>

            <div class="form-group">
                <label class="form-label">邮箱（可选）</label>
                <input type="email" class="form-input" id="email-input" placeholder="your@email.com">
            </div>

            <button class="btn" onclick="saveProfile()">创建账号</button>
            <button class="btn btn-secondary" onclick="skipAndEnter()">跳过，直接进入</button>

            <p class="tips">💡 完善信息可获得100积分奖励</p>
        </div>

        <!-- 第二步：同步中 -->
        <div id="loading-state" class="hidden">
            <div class="star-decoration">★</div>
            <div class="spinner"></div>
            <h1>正在同步...</h1>
            <p>保存您的会员信息</p>
        </div>

        <!-- 第三步：同步成功 -->
        <div id="success-state" class="hidden">
            <div class="star-decoration">★</div>
            <div class="status-icon success"></div>
            <h1>同步成功！</h1>
            <p>欢迎加入 ChineseRocks 大家庭</p>

            <div class="user-info">
                <div class="user-info-item">
                    <span class="user-info-label">昵称</span>
                    <span class="user-info-value" id="user-name">-</span>
                </div>
                <div class="user-info-item">
                    <span class="user-info-label">用户ID</span>
                    <span class="user-info-value" id="user-id">-</span>
                </div>
                <div class="user-info-item">
                    <span class="user-info-label">手机号</span>
                    <span class="user-info-value" id="user-phone">-</span>
                </div>
                <div class="user-info-item">
                    <span class="user-info-label">会员状态</span>
                    <span class="user-info-value" style="color: #FF0066; font-weight: 700;">已激活</span>
                </div>
                <div class="user-info-item">
                    <span class="user-info-label">当前积分</span>
                    <span class="user-info-value points" id="user-points">100</span>
                </div>
            </div>

            <button class="btn" onclick="enterWebsite()">进入网站</button>
        </div>

        <div class="brand-footer">搖滾萬歲 ★ Emanon Ent.</div>
    </div>

    <script>
        let userPhone = '';

        // 获取URL参数
        function getUrlParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        // 验证手机号
        function isValidChinesePhone(phone) {
            if (!phone) return false;
            phone = phone.replace(/[\s\[\]]/g, '');
            return /^1[3-9]\d{9}$/.test(phone);
        }

        // 脱敏手机号
        function maskPhone(phone) {
            if (!phone || phone.length !== 11) return phone;
            return phone.substring(0, 3) + '****' + phone.substring(7);
        }

        // 页面加载
        window.onload = function() {
            userPhone = getUrlParam('phone');

            console.log('URL:', window.location.href);
            console.log('Phone param:', userPhone);

            // 清理手机号
            if (userPhone) {
                userPhone = userPhone.replace(/[\[\]]/g, '').trim();
            }

            // 验证手机号
            if (!userPhone || !isValidChinesePhone(userPhone)) {
                // 参数错误，显示错误页面
                console.error('Invalid phone:', userPhone);
                showErrorState();
                return;
            }

            // 有效手机号，显示正常页面
            document.getElementById('display-phone').textContent = maskPhone(userPhone);

            // 设置默认昵称
            const defaultName = '摇滚用户' + userPhone.slice(-4);
            document.getElementById('nickname-input').value = defaultName;

            // 检查是否已存在该用户
            checkExistingUser();
        };

        // 显示错误状态
        function showErrorState() {
            document.getElementById('welcome-state').classList.add('hidden');
            document.getElementById('error-state').classList.remove('hidden');

            // 5秒后显示调试按钮（用于测试）
            setTimeout(() => {
                const debugBtn = document.getElementById('debug-btn');
                if (debugBtn) debugBtn.style.display = 'inline-block';
            }, 5000);
        }

        // 调试模式（手动输入）
        function showDebug() {
            const phone = prompt('请输入测试手机号（11位）：');
            if (phone && isValidChinesePhone(phone)) {
                userPhone = phone;
                document.getElementById('error-state').classList.add('hidden');
                document.getElementById('welcome-state').classList.remove('hidden');
                document.getElementById('display-phone').textContent = maskPhone(phone);
                document.getElementById('nickname-input').value = '摇滚用户' + phone.slice(-4);
            }
        }

        // 检查已存在用户
        function checkExistingUser() {
            try {
                const existing = localStorage.getItem('chineserocks_user');
                if (existing) {
                    const user = JSON.parse(existing);
                    if (user.phone === userPhone) {
                        // 已存在，直接显示成功
                        showSuccess(user);
                    }
                }
            } catch (e) {
                console.log('Check existing error:', e);
            }
        }

        // 保存资料
        function saveProfile() {
            if (!userPhone || !isValidChinesePhone(userPhone)) {
                alert('手机号错误，请重新进入');
                return;
            }

            const nickname = document.getElementById('nickname-input').value.trim();
            const email = document.getElementById('email-input').value.trim();

            if (!nickname) {
                alert('请输入昵称');
                return;
            }

            // 显示加载
            document.getElementById('welcome-state').classList.add('hidden');
            document.getElementById('loading-state').classList.remove('hidden');

            // 创建用户数据
            const userId = 'CR_' + userPhone.slice(-8);
            const userInfo = {
                userId: userId,
                phone: userPhone,
                name: nickname,
                email: email,
                points: 100,
                memberType: '体验会员',
                isLoggedIn: true,
                loginTime: new Date().toISOString(),
                source: 'miniprogram'
            };

            // 保存到本地
            localStorage.setItem('chineserocks_user', JSON.stringify(userInfo));
            localStorage.setItem('userLoggedIn', 'true');
            localStorage.setItem('userId', userInfo.userId);
            localStorage.setItem('userNickname', userInfo.name);
            localStorage.setItem('userPhone', userInfo.phone);
            if (email) localStorage.setItem('userEmail', email);

            // 显示成功
            setTimeout(() => {
                showSuccess(userInfo);
            }, 1000);
        }

        // 跳过
        function skipAndEnter() {
            const nickname = document.getElementById('nickname-input').value.trim();
            if (!nickname) {
                document.getElementById('nickname-input').value = '摇滚用户' + userPhone.slice(-4);
            }
            saveProfile();
        }

        // 显示成功
        function showSuccess(user) {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('success-state').classList.remove('hidden');

            document.getElementById('user-name').textContent = user.name;
            document.getElementById('user-id').textContent = user.userId;
            document.getElementById('user-phone').textContent = maskPhone(user.phone);

            // 3秒后自动跳转
            setTimeout(() => {
                enterWebsite();
            }, 3000);
        }

        // 进入主站
        function enterWebsite() {
            window.location.href = 'https://chineserocks.net/?synced=1&from=miniprogram';
        }
    </script> 
</body>
</html>
