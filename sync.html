<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员同步 - ChineseRocks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 30px;
            border-radius: 20px;
        }
        
        .status-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        .status-icon.loading::after {
            content: '⏳';
            animation: pulse 1.5s infinite;
        }
        
        .status-icon.success::after {
            content: '✅';
        }
        
        .status-icon.error::after {
            content: '❌';
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #fff;
        }
        
        p {
            font-size: 16px;
            color: #888;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .user-info {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
        }
        
        .user-info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .user-info-item:last-child {
            margin-bottom: 0;
        }
        
        .user-info-label {
            color: #666;
        }
        
        .user-info-value {
            color: #fff;
            font-weight: 500;
        }
        
        .points {
            color: #ff6b35;
            font-size: 24px;
            font-weight: bold;
        }
        
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: #ff6b35;
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }
        
        .btn:hover {
            background: #ff8555;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: transparent;
            border: 1px solid #444;
            margin-top: 10px;
        }
        
        .btn-secondary:hover {
            border-color: #ff6b35;
            color: #ff6b35;
        }
        
        .error-detail {
            background: rgba(255,0,0,0.1);
            border-left: 3px solid #ff4444;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            font-size: 14px;
            color: #ff8888;
            border-radius: 0 8px 8px 0;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://chineserocks.net/logo.png" alt="ChineseRocks" class="logo" onerror="this.style.display='none'">
        
        <!-- 加载中 -->
        <div id="loading-state">
            <div class="status-icon loading"></div>
            <h1>正在同步会员数据...</h1>
            <p>请稍候，正在连接服务器</p>
        </div>
        
        <!-- 同步成功 -->
        <div id="success-state" class="hidden">
            <div class="status-icon success"></div>
            <h1>会员同步成功！</h1>
            <p>您的会员信息已成功同步到网站</p>
            
            <div class="user-info">
                <div class="user-info-item">
                    <span class="user-info-label">用户ID</span>
                    <span class="user-info-value" id="user-id">-</span>
                </div>
                <div class="user-info-item">
                    <span class="user-info-label">手机号</span>
                    <span class="user-info-value" id="user-phone">-</span>
                </div>
                <div class="user-info-item">
                    <span class="user-info-label">当前积分</span>
                    <span class="user-info-value points" id="user-points">0</span>
                </div>
            </div>
            
            <a href="/" class="btn">进入网站</a>
            <br>
            <button class="btn btn-secondary" onclick="goBack()">返回小程序</button>
        </div>
        
        <!-- 新用户注册 -->
        <div id="register-state" class="hidden">
            <div class="status-icon">🎉</div>
            <h1>欢迎加入 ChineseRocks！</h1>
            <p>检测到您是新用户，是否创建网站会员账号？</p>
            
            <div class="user-info">
                <div class="user-info-item">
                    <span class="user-info-label">手机号</span>
                    <span class="user-info-value" id="new-phone">-</span>
                </div>
            </div>
            
            <button class="btn" onclick="createAccount()">创建会员账号</button>
            <br>
            <a href="/" class="btn btn-secondary">暂不创建</a>
        </div>
        
        <!-- 错误 -->
        <div id="error-state" class="hidden">
            <div class="status-icon error"></div>
            <h1>同步失败</h1>
            <p id="error-message">请检查网络连接后重试</p>
            <div class="error-detail hidden" id="error-detail"></div>
            <button class="btn" onclick="retry()">重新尝试</button>
        </div>
    </div>

    <script>
        // 获取URL参数
        function getUrlParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }
        
        // 页面加载时执行
        window.onload = function() {
            const phone = getUrlParam('phone');
            const from = getUrlParam('from');
            
            if (!phone) {
                showError('缺少手机号参数', '请从小程序正确访问此页面');
                return;
            }
            
            if (from !== 'miniprogram') {
                showError('非法访问来源', '此页面仅支持从小程序访问');
                return;
            }
            
            // 保存到本地存储
            localStorage.setItem('sync_phone', phone);
            localStorage.setItem('sync_from', from);
            
            // 查询用户信息
            syncUser(phone);
        };
        
        // 同步用户信息
        async function syncUser(phone) {
            try {
                const response = await fetch(`https://chineserocks.net/api/userInfo?phone=${encodeURIComponent(phone)}`);
                const data = await response.json();
                
                if (!data.exists) {
                    // 新用户
                    document.getElementById('new-phone').textContent = phone;
                    showState('register-state');
                    return;
                }
                
                // 已有用户，同步到本地
                const userInfo = {
                    userId: data.userId,
                    phone: data.phone,
                    name: data.name || data.userId,
                    email: data.email,
                    avatar: data.avatar,
                    points: data.points || 0,
                    isLoggedIn: true,
                    loginTime: new Date().toISOString(),
                    source: 'miniprogram_sync'
                };
                
                // 保存到localStorage
                localStorage.setItem('chineserocks_user', JSON.stringify(userInfo));
                
                // 显示成功信息
                document.getElementById('user-id').textContent = userInfo.userId;
                document.getElementById('user-phone').textContent = userInfo.phone || phone;
                document.getElementById('user-points').textContent = userInfo.points;
                
                showState('success-state');
                
                // 可选：同步到Notion（记录登录行为）
                logUserAction(userInfo.userId, 'miniprogram_login');
                
            } catch (error) {
                showError('网络请求失败', error.message);
            }
        }
        
        // 创建新账号
        async function createAccount() {
            const phone = localStorage.getItem('sync_phone');
            const userId = 'mp_' + phone.slice(-8) + '_' + Date.now().toString(36);
            
            const userInfo = {
                userId: userId,
                phone: phone,
                name: '微信用户' + phone.slice(-4),
                points: 0,
                isLoggedIn: true,
                loginTime: new Date().toISOString(),
                source: 'miniprogram_new'
            };
            
            localStorage.setItem('chineserocks_user', JSON.stringify(userInfo));
            
            // 这里可以调用API创建用户
            // await fetch('https://chineserocks.net/api/createUser', {...});
            
            alert('账号创建成功！');
            window.location.href = '/';
        }
        
        // 记录用户行为
        async function logUserAction(userId, action) {
            try {
                await fetch('https://chineserocks.net/api/logAction', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        action: action,
                        timestamp: new Date().toISOString()
                    })
                });
            } catch (e) {
                console.log('Log action failed:', e);
            }
        }
        
        // 显示指定状态
        function showState(stateId) {
            document.querySelectorAll('[id$="-state"]').forEach(el => {
                el.classList.add('hidden');
            });
            document.getElementById(stateId).classList.remove('hidden');
        }
        
        // 显示错误
        function showError(message, detail) {
            document.getElementById('error-message').textContent = message;
            if (detail) {
                document.getElementById('error-detail').textContent = detail;
                document.getElementById('error-detail').classList.remove('hidden');
            }
            showState('error-state');
        }
        
        // 重试
        function retry() {
            const phone = localStorage.getItem('sync_phone');
            showState('loading-state');
            syncUser(phone);
        }
        
        // 返回小程序（微信内置浏览器）
        function goBack() {
            if (window.wx && window.wx.miniProgram) {
                window.wx.miniProgram.navigateBack();
            } else {
                // 普通浏览器，关闭窗口或返回首页
                window.close();
                // 如果无法关闭，跳转到首页
                setTimeout(() => {
                    window.location.href = '/';
                }, 100);
            }
        }
    </script> 
</body>
</html>
