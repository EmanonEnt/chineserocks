<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员注册 - ChineseRocks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #c0c0c0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .brand-header {
            margin-bottom: 25px;
        }

        .brand-title {
            font-size: 24px;
            font-weight: 900;
            color: #FF0066;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .brand-subtitle {
            font-size: 10px;
            color: #888;
            letter-spacing: 3px;
        }

        .star-decoration {
            font-size: 36px;
            color: #FF0066;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(255, 0, 102, 0.5);
            animation: starGlow 2s ease-in-out infinite alternate;
        }

        @keyframes starGlow {
            from { 
                text-shadow: 0 0 10px rgba(255, 0, 102, 0.5), 0 0 20px rgba(255, 0, 102, 0.3);
                transform: scale(1);
            }
            to { 
                text-shadow: 0 0 20px rgba(255, 0, 102, 0.8), 0 0 40px rgba(255, 0, 102, 0.5);
                transform: scale(1.1);
            }
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 0, 102, 0.2);
            border-top-color: #FF0066;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #fff;
            font-weight: 800;
            letter-spacing: 1px;
        }

        p {
            font-size: 14px;
            color: #888;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 6px;
            padding-left: 5px;
        }

        .form-label .required {
            color: #FF0066;
            margin-left: 2px;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #FF0066;
            background: rgba(255, 255, 255, 0.08);
        }

        .form-input::placeholder {
            color: #555;
        }

        .input-hint {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
            padding-left: 5px;
        }

        .user-info {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 0, 102, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
        }

        .user-info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .user-info-item:last-child {
            margin-bottom: 0;
        }

        .user-info-label {
            color: #666;
        }

        .user-info-value {
            color: #fff;
            font-weight: 600;
        }

        .points {
            color: #FF0066;
            font-size: 18px;
            font-weight: 900;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 14px 40px;
            background: #FF0066;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: #CC0052;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 0, 102, 0.3);
        }

        .btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: transparent;
            border: 1.5px solid #FF0066;
            color: #FF0066;
        }

        .btn-secondary:hover {
            background: rgba(255, 0, 102, 0.1);
            color: #FF0066;
        }

        .status-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .status-icon.success::after {
            content: '✅';
        }

        .brand-footer {
            font-size: 11px;
            color: #444;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 30px;
        }

        .hidden {
            display: none;
        }

        .tips {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            line-height: 1.5;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #555;
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider span {
            padding: 0 15px;
        }

        .contact-options {
            display: flex;
            gap: 10px;
        }

        .contact-options .form-group {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand-header">
            <div class="brand-title">CHINESE ROCKS</div>
            <div class="brand-subtitle">NEWS ★ CHARTS ★ MAGAZINE</div>
        </div>

        <!-- 主页面：填写信息 -->
        <div id="main-state">
            <div class="star-decoration">★</div>
            <h1>欢迎加入 ChineseRocks！</h1>
            <p>创建您的摇滚身份</p>

            <div class="form-group">
                <label class="form-label">昵称 <span class="required">*</span></label>
                <input type="text" class="form-input" id="nickname-input" placeholder="请输入您的昵称" maxlength="20">
            </div>

            <div class="divider"><span>联系方式（手机或邮箱至少填一个）</span></div>

            <div class="contact-options">
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <input type="tel" class="form-input" id="phone-input" placeholder="11位手机号" maxlength="11">
                </div>
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="form-input" id="email-input" placeholder="your@email.com">
                </div>
            </div>
            <p class="input-hint">* 手机号或邮箱至少填写一项，用于找回账号</p>

            <button class="btn" onclick="saveProfile()">创建账号</button>

            <p class="tips">💡 注册即可获得100积分奖励</p>
        </div>

        <!-- 同步中 -->
        <div id="loading-state" class="hidden">
            <div class="star-decoration">★</div>
            <div class="spinner"></div>
            <h1>正在创建账号...</h1>
            <p>保存您的会员信息</p>
        </div>

        <!-- 同步成功 -->
        <div id="success-state" class="hidden">
            <div class="star-decoration">★</div>
            <div class="status-icon success"></div>
            <h1>注册成功！</h1>
            <p>欢迎加入 ChineseRocks 大家庭</p>

            <div class="user-info">
                <div class="user-info-item">
                    <span class="user-info-label">昵称</span>
                    <span class="user-info-value" id="user-name">-</span>
                </div>
                <div class="user-info-item">
                    <span class="user-info-label">用户ID</span>
                    <span class="user-info-value" id="user-id">-</span>
                </div>
                <div class="user-info-item">
                    <span class="user-info-label">联系方式</span>
                    <span class="user-info-value" id="user-contact">-</span>
                </div>
                <div class="user-info-item">
                    <span class="user-info-label">会员状态</span>
                    <span class="user-info-value" style="color: #FF0066; font-weight: 700;">已激活</span>
                </div>
                <div class="user-info-item">
                    <span class="user-info-label">当前积分</span>
                    <span class="user-info-value points" id="user-points">100</span>
                </div>
            </div>

            <button class="btn" onclick="enterWebsite()">进入网站</button>
        </div>

        <div class="brand-footer">搖滾萬歲 ★ Emanon Ent.</div>
    </div>

    <script>
        // 验证手机号
        function isValidChinesePhone(phone) {
            if (!phone) return false;
            return /^1[3-9]\d{9}$/.test(phone);
        }

        // 验证邮箱
        function isValidEmail(email) {
            if (!email) return false;
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // 脱敏手机号
        function maskPhone(phone) {
            if (!phone || phone.length !== 11) return phone;
            return phone.substring(0, 3) + '****' + phone.substring(7);
        }

        // 脱敏邮箱
        function maskEmail(email) {
            if (!email) return email;
            const atIndex = email.indexOf('@');
            if (atIndex <= 2) return email;
            return email.substring(0, 2) + '***' + email.substring(atIndex);
        }

        // 页面加载
        window.onload = function() {
            // 检查是否已存在该用户
            checkExistingUser();
        };

        // 检查已存在用户
        function checkExistingUser() {
            try {
                const existing = localStorage.getItem('chineserocks_user');
                if (existing) {
                    const user = JSON.parse(existing);
                    // 如果本地有数据，直接显示成功
                    showSuccess(user);
                }
            } catch (e) {
                console.log('Check existing error:', e);
            }
        }

        // 保存资料
        function saveProfile() {
            const nickname = document.getElementById('nickname-input').value.trim();
            const phone = document.getElementById('phone-input').value.trim();
            const email = document.getElementById('email-input').value.trim();

            // 验证昵称
            if (!nickname) {
                alert('请输入昵称');
                document.getElementById('nickname-input').focus();
                return;
            }

            // 验证联系方式（至少填一个）
            if (!phone && !email) {
                alert('请填写手机号或邮箱至少一项');
                document.getElementById('phone-input').focus();
                return;
            }

            // 验证手机号格式（如果填写了）
            if (phone && !isValidChinesePhone(phone)) {
                alert('请输入正确的11位手机号');
                document.getElementById('phone-input').focus();
                return;
            }

            // 验证邮箱格式（如果填写了）
            if (email && !isValidEmail(email)) {
                alert('请输入正确的邮箱格式');
                document.getElementById('email-input').focus();
                return;
            }

            // 显示加载
            document.getElementById('main-state').classList.add('hidden');
            document.getElementById('loading-state').classList.remove('hidden');

            // 生成用户ID
            const contact = phone || email;
            const userId = 'CR_' + (phone ? phone.slice(-8) : email.substring(0, 8));

            const userInfo = {
                userId: userId,
                name: nickname,
                phone: phone || null,
                email: email || null,
                points: 100,
                memberType: '体验会员',
                isLoggedIn: true,
                loginTime: new Date().toISOString(),
                source: 'manual_register'
            };

            // 保存到本地
            localStorage.setItem('chineserocks_user', JSON.stringify(userInfo));
            localStorage.setItem('userLoggedIn', 'true');
            localStorage.setItem('userId', userInfo.userId);
            localStorage.setItem('userNickname', userInfo.name);
            if (phone) localStorage.setItem('userPhone', phone);
            if (email) localStorage.setItem('userEmail', email);

            // 显示成功
            setTimeout(() => {
                showSuccess(userInfo);
            }, 1000);
        }

        // 显示成功
        function showSuccess(user) {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('success-state').classList.remove('hidden');

            document.getElementById('user-name').textContent = user.name;
            document.getElementById('user-id').textContent = user.userId;

            // 显示联系方式（脱敏）
            let contactDisplay = '';
            if (user.phone) {
                contactDisplay = maskPhone(user.phone);
            } else if (user.email) {
                contactDisplay = maskEmail(user.email);
            }
            document.getElementById('user-contact').textContent = contactDisplay;

            // 3秒后自动跳转
            setTimeout(() => {
                enterWebsite();
            }, 3000);
        }

        // 进入主站
        function enterWebsite() {
            window.location.href = 'https://chineserocks.net/?registered=1';
        }
    </script> 
</body>
</html>
