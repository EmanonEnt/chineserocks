<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章詳情 - ChineseRocks</title>
    <link rel="icon" type="image/png" href="./image/tablogo.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0a0a;
            color: #c0c0c0;
            line-height: 1.6;
        }
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-container {
            max-width: 1400px; margin: 0 auto; padding: 0 2rem;
            display: flex; justify-content: space-between; align-items: center; height: 70px;
        }
        .logo img { height: 40px; width: auto; display: block; }
        .back-btn {
            color: #FF0066; text-decoration: none; font-weight: 700;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .article-container {
            max-width: 800px; margin: 100px auto 4rem; padding: 0 2rem;
        }
        .article-header {
            margin-bottom: 2rem;
        }
        .article-category {
            display: inline-block; background: #FF0066; color: white;
            padding: 0.3rem 0.8rem; font-size: 0.75rem; font-weight: 800;
            text-transform: uppercase; margin-bottom: 1rem;
        }
        .article-title {
            font-size: 2.5rem; font-weight: 900; color: white;
            line-height: 1.2; margin-bottom: 1rem;
        }
        .article-meta {
            color: #888; font-size: 0.9rem;
            display: flex; gap: 1rem; align-items: center;
        }
        .article-cover {
            width: 100%; aspect-ratio: 16/9; object-fit: cover;
            border-radius: 12px; margin-bottom: 2rem;
        }
        .article-content {
            font-size: 1.1rem; line-height: 1.8; color: #c0c0c0;
        }
        .article-content p {
            margin-bottom: 1.5rem;
        }
        .loading {
            text-align: center; padding: 4rem; color: #666;
        }
        .error {
            text-align: center; padding: 4rem; color: #ff4444;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="./image/chineserockslogo.png" alt="ChineseRocks">
            </a>
            <a href="index.html" class="back-btn">← 返回首頁</a>
        </div>
    </nav>

    <div class="article-container" id="articleContainer">
        <div class="loading">加載中...</div>
    </div>

    <script>
        // 從 URL 獲取文章 ID
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        if (!articleId) {
            document.getElementById('articleContainer').innerHTML = 
                '<div class="error">文章不存在</div>';
        } else {
            // 加載文章內容
            loadArticle(articleId);
        }

        async function loadArticle(id) {
            try {
                // 嘗試從 news.json 加載
                const response = await fetch('data/news.json');
                const data = await response.json();

                let allNews = [];
                if (data.data && data.data.all) {
                    allNews = data.data.all;
                } else if (data.all) {
                    allNews = data.all;
                } else if (Array.isArray(data)) {
                    allNews = data;
                }

                // 查找文章
                const article = allNews.find(item => 
                    item.title === id || item.id === id
                );

                if (article) {
                    renderArticle(article);
                } else {
                    // 如果找不到，顯示標題作為內容
                    renderSimpleArticle(id);
                }
            } catch (error) {
                console.error('加載失敗:', error);
                renderSimpleArticle(id);
            }
        }

        function renderArticle(article) {
            const container = document.getElementById('articleContainer');
            container.innerHTML = `
                <article class="article-header">
                    <span class="article-category">${article.category || '新聞'}</span>
                    <h1 class="article-title">${article.title}</h1>
                    <div class="article-meta">
                        <span>${formatDate(article.published_date)}</span>
                        <span>·</span>
                        <span>${article.author || 'ChineseRocks 編輯部'}</span>
                    </div>
                </article>
                ${article.cover_image ? `<img src="${article.cover_image}" alt="${article.title}" class="article-cover">` : ''}
                <div class="article-content">
                    <p>${article.content || article.excerpt || '暫無內容'}</p>
                </div>
            `;
        }

        function renderSimpleArticle(title) {
            const container = document.getElementById('articleContainer');
            container.innerHTML = `
                <article class="article-header">
                    <span class="article-category">新聞</span>
                    <h1 class="article-title">${decodeURIComponent(title)}</h1>
                    <div class="article-meta">
                        <span>${new Date().toLocaleDateString('zh-TW')}</span>
                        <span>·</span>
                        <span>ChineseRocks 編輯部</span>
                    </div>
                </article>
                <div class="article-content">
                    <p>文章內容正在編輯中，敬請期待...</p>
                    <p>感謝您對 ChineseRocks 的支持！</p>
                </div>
            `;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '今天';
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('zh-TW', { 
                    year: 'numeric', month: 'long', day: 'numeric' 
                });
            } catch (e) {
                return '今天';
            }
        }
    </script>
</body>
</html>
